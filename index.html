<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>
  <style type="text/tailwindcss">
    body {             
      background-image: url("./img/bg3.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      width: 80%;
      margin: 0 auto;
      min-height: 100vh; 
      display: flex;
      flex-direction: column;
      align-items: center; 
      overflow-x: hidden;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;      
    }   

    @media (max-width: 640px) {
      body {
        width: 95%; 
      }
      .responsive-title {
        font-size: 32px !important; 
        margin-top: 30px !important;
        margin-bottom: 30px !important;
      }
      .responsive-card {
        width: 100% !important; 
        padding: 24px 16px !important; 
      }
      .responsive-row {
        flex-direction: column !important; 
        gap: 8px !important;
        align-items: stretch !important;
        text-align: center;
      }
      .responsive-row input {
        width: 100% !important;
        padding: 8px 0 !important;
        text-align: center;
      }
    }
  </style>  
  <link rel="shortcut icon" href="shopping-cart.svg" type="image/svg">
  <title>JS - 10.1</title>
</head>

<body> 

      <h1 class="font-bold text-6xl my-15 text-center text-cyan-950 responsive-title">Suma valores entre dos números</h1>   

      <div class="bg-cyan-950 text-cyan-100 responsive-card w-2/4 p-10 rounded-lg shadow-xl">
   
        <p class="flex flex-row justify-center gap-10 mb-6 text-2xl responsive-row">
          <label for="num1">Escribe un numero:</label>
          <input type="number" id="num1" class="border-cyan-100 border-2 rounded-lg px-4 bg-transparent text-white" placeholder="Escribe un numero:">
        </p>
            
        <p class="flex flex-row justify-center gap-10 mb-6 text-2xl responsive-row">
          <label for="num2">Escribe otro numero:</label>
          <input type="number" id="num2" class="border-cyan-100 border-2 rounded-lg px-4 bg-transparent text-white" placeholder="Escribe otro numero:">
        </p>
      
        <div class="flex justify-center text-2xl">
          <button onclick="calcularSuma()" class="bg-fuchsia-700 text-white px-8 py-2 rounded-lg font-bold border-b-4 border-fuchsia-900 active:border-b-0 active:translate-y-1 transition-all cursor-pointer w-full sm:w-auto text-center">RESULTADO</button>      
        </div>  
        
        <p id="resultado" class="text-4xl text-fuchsia-200 text-center mt-5 min-h-10 font-bold"></p>
     </div>
        
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./js/app.js"></script>
</body>

</html>
